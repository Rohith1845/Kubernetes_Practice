apiVersion: v1
kind: Pod
metadata:
  name: resource
  labels:
    purpose: requests-limits
    project: roboshop
spec:
  containers:
  - name: nginx
    image: nginx:latest
    resources:
      requests:
        memory: "68mi"
        cpu: "100m"
      limits:
        memory: "100mi"
        cpu: "120m"
